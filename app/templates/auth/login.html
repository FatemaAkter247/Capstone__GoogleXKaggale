{% extends 'base.html' %}

{% block title %}Log In - ResQLink{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card border-0 p-4 shadow">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="fw-bold mt-2">Sign In</h2>
                    <p class="text-muted small">Access your ResQLink coordination workspace</p>
                </div>
                
                <form method="POST">
                    <!-- Username or Email -->
                    <div class="mb-3">
                        <label for="username_or_email" class="form-label fw-semibold">Username or Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-fill text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-start-0" id="username_or_email" name="username_or_email" placeholder="Enter your username or email" required autocomplete="username">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                            <input type="password" class="form-control bg-light border-start-0" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-gradient py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                        </button>
                    </div>
                </form>

                <hr class="text-muted">

                <div class="text-center mt-3">
                    <p class="mb-0 text-muted small">
                        Don't have an account? 
                        <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold text-decoration-none">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
